services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: autofacil
      POSTGRES_PASSWORD: autofacil
      POSTGRES_DB: autofacil
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build: .
    ports:
      - "3668:3668"
    environment:
      DATABASE_URL: postgresql://autofacil:autofacil@postgres:5432/autofacil
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      - postgres

  frontend:
    build: ./projetoagro_ui
    args:
      - VITE_API_URL=http://backend:3668
    ports:
      - "80:80"
    depends_on:
      - backendd

volumes:
  postgres_data:
